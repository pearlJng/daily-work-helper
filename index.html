  if(!bar)return;

  const allItems=[
    ...rmData.out.map(x=>({...x,dir:'out'})),
    ...rmData.in.map(x=>({...x,dir:'in'}))
  ].filter(x=>!x.done);
  // sort urgent first
  allItems.sort((a,b)=>rmDaysDiff(b.date)-rmDaysDiff(a.date));

  if(!allItems.length||!postitVisible){
    bar.innerHTML='';
    const bar2=document.getElementById('postit-bar');if(bar2)bar2.classList.remove('visible');
    const toggle=document.getElementById('postit-toggle');
    if(toggle)toggle.style.display=allItems.length?'block':'none';
    return;
  }

  bar.innerHTML=allItems.map(item=>{
    const diff=item.date?rmDaysDiff(item.date):-1;
    let daysCls='ok',daysLabel='';
    if(diff>=0){daysLabel=diff===0?'오늘 등록':`D+${diff}일`;daysCls=diff>=7?'urgent':diff>=3?'warn':'ok';}
    const isUrgent=diff>=7;
    const cardCls=isUrgent?'urgent':(item.dir==='out'?'out':'in');
    const dirLabel=item.dir==='out'?'↑ 내가 요청':'↓ 고객사 요청';
    return `<div class="postit ${cardCls}" onclick="openRmDrawer()" title="${esc(item.req)}">
      <button class="postit-done-x" onclick="event.stopPropagation();rmToggleDone('${item.id}','${item.dir}')" title="완료">✓</button>
      <div class="postit-dir">${dirLabel}</div>
      <div class="postit-client">${esc(item.client)}</div>
      <div class="postit-req">${esc(item.req)}</div>
      ${daysLabel?`<div class="postit-days ${daysCls}">${daysLabel}</div>`:''}
    </div>`;
  }).join('') + `<div class="postit-add-btn">
    <button class="postit-add-pill" onclick="openRmDrawer()" title="리마인더 추가">+</button>
  </div>`;

  if(layout){
    const barEl=document.getElementById('postit-bar');
    if(barEl)barEl.classList.add('visible');
    if(barEl){
      const h=barEl.offsetHeight||68;
      // height handled by flex
      layout.style.marginTop=h+'px';
    }
  }
  const toggle=document.getElementById('postit-toggle');
  if(toggle)toggle.style.display='block';
}

function fbDaysDiff(ds){ if(!ds)return 0; const d=new Date(ds+'T00:00:00'),t=new Date(todayStr+'T00:00:00'); return Math.floor((t-d)/86400000); }

let clDragId=null, clDragTaskId=null;

function clDragStart(ev, taskId, itemId){
  clDragId=itemId; clDragTaskId=taskId;
  ev.currentTarget.classList.add('dragging');
}
function clDragOver(ev, taskId, itemId){ ev.preventDefault(); if(clDragId===itemId)return; document.querySelectorAll('.pm-cl-item').forEach(el=>el.classList.remove('drag-over')); ev.currentTarget.classList.add('drag-over'); }
function clDrop(ev, taskId, targetId){
  ev.preventDefault(); document.querySelectorAll('.pm-cl-item').forEach(el=>el.classList.remove('drag-over'));
  if(clDragId===targetId)return;
  const t=findTask(taskId); if(!t||!t.checklist)return;
  const fi=t.checklist.findIndex(x=>x.id===clDragId), ti=t.checklist.findIndex(x=>x.id===targetId);
  if(fi<0||ti<0)return;
  const [item]=t.checklist.splice(fi,1); t.checklist.splice(ti,0,item);
  wSave(); renderPM();
}
function clDragEnd(){ document.querySelectorAll('.pm-cl-item').forEach(el=>el.classList.remove('dragging','drag-over')); clDragId=null; }

          ${t.client?`<span class="pm-card-client">${esc(t.client)}</span>`:''}
          ${!t.isProject&&t.date?`<span class="pm-card-date">${fmtD(t.date)}</span>`:''}
          <span class="st-badge st-${st}" onclick="cycleStatus('${sid}',event)">${stInfo.icon} ${stInfo.label}</span>
        </div>
      </div>
      <div class="pm-card-actions">
        ${fbBtn}
        <button class="pm-ia" onclick="startPmEdit('${sid}')">✎</button>
        <button class="pm-ia del" onclick="pmDelete('${sid}')">✕</button>
      </div>
    </div>
    ${ganttHtml}
    ${clHtml}
    ${editPanel}
  </div>`;
}

function doLogin(){
  const val = document.getElementById('login-input').value.trim();
  const errEl = document.getElementById('login-err');
  if(!val){ errEl.textContent = '사번을 입력해주세요'; return; }
  if(val.length < 4){ errEl.textContent = '사번이 너무 짧아요'; return; }
  // 사번을 username으로 저장
  if(!WS.username) WS.username = val;
  sessionStorage.setItem('wr_empid', val);
  document.getElementById('login-wrap').style.display = 'none';
  errEl.textContent = '';
  toast(`${val}님, 환영해요 👋`);
}
function checkLogin(){
  const saved = sessionStorage.getItem('wr_empid');
  if(saved){
    document.getElementById('login-wrap').style.display = 'none';
  }
}
