<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════ */
:root {
  --bg:        #F5F4F0;
  --panel:     #FAFAF8;
  --card:      #FFFFFF;
  --hover:     #F0EFEB;
  --input-bg:  #F0EFEB;
  --border:    rgba(0,0,0,0.07);
  --border-2:  rgba(0,0,0,0.11);
  --text:      #1C1C1A;
  --text-2:    #6B6964;
  --text-3:    #A8A49F;
  --shadow:    0 1px 3px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 14px rgba(0,0,0,0.07),0 0 0 0.5px rgba(0,0,0,0.04);
  --r:         10px;
  --r-lg:      16px;
  --r-xl:      22px;
  --font:      'Pretendard',-apple-system,sans-serif;
  /* Status — muted palette */
  --done:   #6E9B76; --working: #5B7C99; --review: #C9A86A;
  --revise: #B07A5A; --hold:    #8B85A0; --wait:   #9B9490;
  --urgent: #C97B7B;
  /* AI brief */
  --ai-bg:     #EAF2FF; --ai-border: #C5DAF7; --ai-text: #334155;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ════════════════════════════════════════
   LOGIN
════════════════════════════════════════ */
.login-wrap{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.login-card{background:var(--card);border-radius:var(--r-xl);padding:44px 40px;width:360px;max-width:92vw;box-shadow:var(--shadow-md);text-align:center;}
.login-mark{font-size:26px;margin-bottom:16px;}
.login-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:5px;}
.login-sub{font-size:12px;color:var(--text-3);margin-bottom:28px;line-height:1.7;}
.login-lbl{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;text-align:left;margin-bottom:5px;}
.login-inp{width:100%;font-size:18px;font-weight:600;padding:13px 16px;border:1.5px solid var(--border-2);border-radius:var(--r);background:var(--input-bg);color:var(--text);font-family:var(--font);text-align:center;letter-spacing:4px;margin-bottom:12px;transition:border-color .15s,background .15s;}
.login-inp:focus{outline:none;border-color:var(--text);background:#fff;}
.login-btn{width:100%;padding:13px;font-size:13px;font-weight:600;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);letter-spacing:.2px;transition:opacity .15s;}
.login-btn:hover{opacity:.82;}
.login-err{font-size:12px;color:var(--urgent);margin-top:8px;min-height:16px;}
.login-hint{font-size:11px;color:var(--text-3);margin-top:18px;line-height:1.7;}

/* ════════════════════════════════════════
   LAYOUT — Left 58% | Right 42%
════════════════════════════════════════ */
.layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.left-panel{width:58%;min-width:300px;flex-shrink:0;background:var(--panel);overflow-y:auto;overflow-x:hidden;border-right:1px solid var(--border);}
.left-panel::-webkit-scrollbar{width:3px;}
.left-panel::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
.resizer{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
.resizer:hover,.resizer.on{background:var(--border-2);}
.right-panel{flex:1;min-width:260px;display:flex;flex-direction:column;background:var(--panel);overflow:hidden;}

/* ════════════════════════════════════════
   LEFT — CALENDAR (sticky header)
════════════════════════════════════════ */
.lcal-sticky{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--border);}
.lcal-topbar{display:flex;align-items:center;padding:13px 16px 9px;}
.lcal-logo{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--done);margin-left:auto;}
.lcal-mnav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 9px;}
.lcal-mlbl{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.4px;}
.lcal-navs{display:flex;gap:3px;}
.lcal-nav{width:26px;height:26px;border-radius:7px;border:1px solid var(--border-2);background:var(--card);cursor:pointer;font-size:14px;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background .12s;}
.lcal-nav:hover{background:var(--hover);}
.lcal-nav.today{font-size:10px;width:auto;padding:0 9px;font-family:var(--font);font-weight:500;}
.lcal-dlabels{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 5px;}
.lcal-dlbl{text-align:center;font-size:10px;font-weight:600;color:var(--text-3);padding:2px 0;}
.lcal-dlbl.sun{color:var(--urgent);} .lcal-dlbl.sat{color:var(--working);}

/* Calendar grid */
.lcal-grid-area{padding:4px 8px 8px;}
.lcal-grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.lcal-cell{min-height:80px;padding:5px 4px 4px;border-radius:6px;cursor:pointer;transition:background .1s;overflow:hidden;}
.lcal-cell:hover{background:rgba(0,0,0,.025);}
.lcal-cell.today{background:rgba(110,155,118,.07);}
.lcal-cell.today .lcal-cdn{background:var(--text);color:#fff;border-radius:50%;}
.lcal-cell.sel{outline:1.5px solid rgba(0,0,0,.14);}
.lcal-cell.other .lcal-cdn{color:var(--text-3);}
.lcal-cdn{font-size:11px;font-weight:600;color:var(--text);width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;}

/* ── Pill-style event bars (16번) ── */
.lcal-evt{font-size:9px;font-weight:500;padding:2px 8px;border-radius:999px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;transition:filter .15s,transform .15s;cursor:pointer;}
.lcal-evt:hover{filter:brightness(1.07);transform:translateY(-0.5px);}
.lcal-evt.daily{background:#E9F2ED;color:#2F6B3E;}
.lcal-evt.daily.done{background:var(--hover);color:var(--text-3);text-decoration:line-through;}
.lcal-evt.daily.issue{background:#F5EAEA;color:#7A3535;}
.lcal-evt.daily.review{background:#FDF5E8;color:#8A5A00;}
.lcal-evt.proj{color:#fff;font-weight:600;}
.lcal-evt.proj-s{border-radius:999px 0 0 999px;}
.lcal-evt.proj-e{border-radius:0 999px 999px 0;}
.lcal-evt.proj-m{border-radius:0;opacity:.85;}
.lcal-more{font-size:9px;color:var(--text-3);padding:1px 6px;border-radius:999px;background:var(--hover);display:inline-block;margin-top:1px;}

/* ════════════════════════════════════════
   LEFT — DAILY LIST (20번: 오늘 집중)
════════════════════════════════════════ */
.lcal-body{padding:12px 16px 32px;}
.daily-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.daily-date-lbl{font-size:13px;font-weight:700;color:var(--text);}
.daily-sub{font-size:11px;color:var(--text-3);}
.daily-add-btn{font-size:11px;padding:4px 11px;border-radius:999px;border:1px solid var(--border-2);background:var(--card);cursor:pointer;color:var(--text-2);font-family:var(--font);transition:all .15s;}
.daily-add-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}
.daily-sect{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;margin:10px 0 5px 2px;}
/* Daily pill cards (20번) */
.daily-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:background .12s,opacity .2s,transform .15s;box-shadow:var(--shadow);}
.daily-item:hover{background:var(--hover);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.daily-item.done-item{opacity:.4;}
.daily-item.added-today{background:#F0F7F2;border-color:rgba(110,155,118,.25);}
.daily-cb{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.daily-cb:hover:not(.ck){border-color:var(--done);}
.daily-cb.ck{background:var(--done);border-color:var(--done);}
.daily-cb.ck::after{content:'';display:block;width:7px;height:7px;background:#fff;clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);}
.daily-text{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.daily-text.dn{text-decoration:line-through;color:var(--text-3);font-weight:400;}
.daily-client{font-size:10px;color:var(--text-3);flex-shrink:0;}
.daily-pri{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* added-today badge */
.daily-added-badge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:999px;background:#E0F0E6;color:var(--done);flex-shrink:0;}
.daily-x{width:18px;height:18px;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-size:11px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;flex-shrink:0;transition:opacity .12s;}
.daily-item:hover .daily-x{opacity:1;}
.daily-x:hover{background:var(--hover);color:var(--urgent);}
.daily-empty{text-align:center;padding:20px 0;font-size:12px;color:var(--text-3);}

/* Quick add */
.lcal-qa{background:var(--card);border:1px solid var(--border-2);border-radius:var(--r-lg);padding:12px 14px;margin-top:12px;display:none;box-shadow:var(--shadow);}
.lcal-qa.open{display:block;}
.lcal-qa-head{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:8px;}
.lcal-qa-inp{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border-2);border-radius:var(--r);background:var(--input-bg);color:var(--text);font-family:var(--font);margin-bottom:7px;}
.lcal-qa-inp:focus{outline:none;border-color:var(--text);}
.lcal-qa-row{display:flex;gap:5px;}
.lcal-qa-sel{flex:1;font-size:11px;padding:6px 8px;border:1px solid var(--border-2);border-radius:7px;background:var(--input-bg);color:var(--text);font-family:var(--font);appearance:none;cursor:pointer;}
.lcal-qa-go{padding:6px 13px;font-size:12px;font-weight:600;border-radius:7px;border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);}
.lcal-qa-x{padding:6px 8px;font-size:12px;border-radius:7px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);}

/* ════════════════════════════════════════
   RIGHT — HEADER + TABS
════════════════════════════════════════ */
.rheader{padding:13px 18px 0;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.rheader-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.week-nav{display:flex;align-items:center;gap:4px;}
.wnav{width:24px;height:24px;border-radius:6px;border:1px solid var(--border-2);background:var(--card);cursor:pointer;font-size:13px;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background .12s;}
.wnav:hover{background:var(--hover);}
.wlbl{font-size:11px;font-weight:600;color:var(--text-2);min-width:68px;text-align:center;}
.rtab-bar{display:flex;overflow-x:auto;scrollbar-width:none;}
.rtab-bar::-webkit-scrollbar{display:none;}
.rtab{padding:8px 13px;font-size:12px;font-weight:400;color:var(--text-3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;font-family:var(--font);}
.rtab.on{color:var(--text);font-weight:600;border-bottom-color:var(--text);}
.rpane{padding:16px 18px 64px;flex:1;overflow-y:auto;}
.rpane::-webkit-scrollbar{width:3px;}
.rpane::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}

/* ════════════════════════════════════════
   AI BRIEFING (19번 — soft blue)
════════════════════════════════════════ */
.ai-brief{background:var(--ai-bg);border:1px solid var(--ai-border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(91,124,153,.08);}
.ai-brief-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ai-brief-icon{width:28px;height:28px;border-radius:8px;background:rgba(91,124,153,.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ai-brief-title{font-size:12px;font-weight:600;color:var(--ai-text);flex:1;}
.ai-brief-ref{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--ai-border);background:transparent;color:var(--working);cursor:pointer;font-family:var(--font);transition:background .12s;}
.ai-brief-ref:hover{background:var(--working);color:#fff;border-color:var(--working);}
.ai-brief-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(197,218,247,.5);}
.ai-brief-item:last-child{border-bottom:none;}
.ai-brief-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ai-brief-text{font-size:12px;color:var(--ai-text);line-height:1.55;flex:1;}
.ai-brief-empty{font-size:12px;color:rgba(51,65,85,.4);text-align:center;padding:8px 0;}

/* ════════════════════════════════════════
   STATS
════════════════════════════════════════ */
.pm-stats{display:flex;gap:8px;padding:12px 18px;flex-shrink:0;border-bottom:1px solid var(--border);}
.pm-stat{flex:1;background:var(--card);border-radius:var(--r);padding:10px 12px;box-shadow:var(--shadow);}
.pm-stat-val{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1;}
.pm-stat-lbl{font-size:10px;color:var(--text-3);margin-top:3px;}

/* ════════════════════════════════════════
   ADD ROW (right side — daily)
════════════════════════════════════════ */
.pm-add-area{padding:10px 18px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pm-type-row{display:flex;gap:5px;margin-bottom:8px;}
.pm-type-btn{padding:5px 12px;font-size:11px;border-radius:999px;border:1px solid var(--border-2);background:transparent;cursor:pointer;color:var(--text-2);font-family:var(--font);transition:all .12s;}
.pm-type-btn.on{background:var(--text);color:#fff;border-color:var(--text);}
.pm-input-row{display:flex;gap:6px;align-items:center;}
.pm-add-inp{flex:1;font-size:13px;padding:8px 11px;border:1px solid var(--border-2);border-radius:var(--r);background:var(--input-bg);color:var(--text);font-family:var(--font);transition:border-color .15s,background .15s;}
.pm-add-inp:focus{outline:none;border-color:var(--text);background:#fff;}
.pm-add-inp.ai-mode{border-color:var(--review);background:#FFFDF5;}
.pm-client-sel{font-size:12px;padding:7px 9px;border:1px solid var(--border-2);border-radius:var(--r);background:var(--input-bg);color:var(--text);font-family:var(--font);appearance:none;cursor:pointer;max-width:96px;}
.pm-add-go{padding:8px 15px;font-size:12px;font-weight:600;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:opacity .15s;}
.pm-add-go:hover{opacity:.82;}
.pm-ai-hint{font-size:10px;color:var(--review);padding:3px 0 0;display:none;}
.pm-ai-hint.on{display:block;}
.pm-proj-dates{display:none;gap:6px;margin-top:7px;}
.pm-proj-dates.on{display:flex;}
.pm-date-lbl{font-size:10px;color:var(--text-3);align-self:center;white-space:nowrap;}
.pm-date-inp{flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--border-2);border-radius:7px;background:var(--input-bg);color:var(--text);font-family:var(--font);}
.pm-date-inp:focus{outline:none;border-color:var(--text);}

/* ════════════════════════════════════════
   PROJECT ACCORDION (20번)
════════════════════════════════════════ */
.pm-body{flex:1;overflow-y:auto;}
.pm-body::-webkit-scrollbar{width:3px;}
.pm-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
.pm-section-head{display:flex;align-items:center;gap:8px;padding:10px 18px 6px;background:var(--hover);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;}
.pm-sect-title{font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.4px;text-transform:uppercase;flex:1;}
.pm-sect-count{font-size:10px;color:var(--text-3);}
/* Accordion project card */
.acc-card{border-bottom:1px solid var(--border);background:var(--card);transition:background .1s;}
.acc-card:hover{background:#FDFDFB;}
.acc-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;}
.acc-toggle{font-size:12px;color:var(--text-3);flex-shrink:0;transition:transform .2s;width:16px;text-align:center;}
.acc-toggle.open{transform:rotate(90deg);}
.acc-proj-info{flex:1;min-width:0;}
.acc-proj-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.acc-proj-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.acc-tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.acc-tag-gov{background:#E8F0F8;color:#3A5C7A;} .acc-tag-sub{background:#E8F5EE;color:#2E6644;}
.acc-tag-etc{background:var(--hover);color:var(--text-2);}  .acc-tag-proj{background:#F0EEFA;color:#5C3880;}
.acc-client{font-size:10px;font-weight:500;color:var(--text-2);}
.acc-dates{font-size:10px;color:var(--text-3);}
.acc-st{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;}
.acc-st-working{background:#E8EFF5;color:var(--working);}
.acc-st-review{background:#FDF5E8;color:var(--review);}
.acc-st-revise{background:#F5EDE8;color:var(--revise);}
.acc-st-done{background:#E8F2EC;color:var(--done);}
.acc-st-hold{background:#F0EEF5;color:var(--hold);}
/* Progress bar in accordion header */
.acc-prog-wrap{flex-shrink:0;display:flex;align-items:center;gap:6px;}
.acc-prog-bar{width:56px;height:4px;background:var(--hover);border-radius:2px;overflow:hidden;}
.acc-prog-fill{height:100%;border-radius:2px;transition:width .3s;}
.acc-prog-txt{font-size:10px;color:var(--text-3);font-weight:600;min-width:28px;text-align:right;}
/* Accordion body */
.acc-body{display:none;padding:0 18px 12px 18px;border-top:1px solid var(--border);}
.acc-body.open{display:block;}
.acc-body-inner{padding-top:10px;}
/* Checklist inside accordion */
.cl-title{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
.cl-prog{font-size:10px;color:var(--done);font-weight:600;}
.pm-cl-item{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:8px;cursor:grab;transition:background .1s;}
.pm-cl-item:hover{background:var(--hover);}
.pm-cl-item.dragging{opacity:.35;}
.pm-cl-item.drag-over{background:var(--hover);outline:1px dashed var(--border-2);}
.cl-drag{font-size:11px;color:var(--text-3);opacity:0;cursor:grab;flex-shrink:0;}
.pm-cl-item:hover .cl-drag{opacity:1;}
.cl-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border-2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cl-cb:hover:not(.ck){border-color:var(--done);}
.cl-cb.ck{background:var(--done);border-color:var(--done);}
.cl-cb.ck::after{content:'';display:block;width:7px;height:7px;background:#fff;clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);}
.cl-text{font-size:12px;color:var(--text);flex:1;min-width:0;}
.cl-text.dn{text-decoration:line-through;color:var(--text-3);}
/* 17번: 데일리 추가 완료 표시 */
.cl-added{font-size:9px;padding:1px 6px;border-radius:999px;background:#E0F0E6;color:var(--done);flex-shrink:0;font-weight:600;}
.cl-add-daily{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;opacity:0;font-family:var(--font);white-space:nowrap;transition:all .12s;}
.pm-cl-item:hover .cl-add-daily{opacity:1;}
.cl-add-daily:hover{background:var(--text);color:#fff;border-color:var(--text);}
.cl-del{width:16px;height:16px;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-size:10px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:0;}
.pm-cl-item:hover .cl-del{opacity:1;}
.cl-del:hover{color:var(--urgent);opacity:1!important;}
.cl-add-row{display:flex;gap:5px;padding:5px 6px;}
.cl-add-inp{flex:1;font-size:12px;padding:4px 8px;border:1px dashed var(--border-2);border-radius:6px;background:transparent;color:var(--text);font-family:var(--font);}
.cl-add-inp:focus{outline:none;border-color:var(--text);background:#fff;}
.cl-add-sub{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border-2);background:transparent;cursor:pointer;color:var(--text-2);font-family:var(--font);}
.cl-ai-row{display:flex;gap:5px;padding:4px 6px;}
.cl-ai-inp{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--border-2);border-radius:7px;background:var(--input-bg);color:var(--text);font-family:var(--font);}
.cl-ai-inp:focus{outline:none;border-color:var(--text);}
.cl-ai-btn{font-size:10px;padding:5px 10px;border-radius:7px;border:none;background:var(--working);color:#fff;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:opacity .12s;}
.cl-ai-btn:hover{opacity:.82;}
.cl-ai-btn:disabled{opacity:.4;}
/* Daily tasks inside project */
.acc-daily-item{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:8px;transition:background .1s;}
.acc-daily-item:hover{background:var(--hover);}
.acc-daily-cb{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border-2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.acc-daily-cb:hover:not(.ck){border-color:var(--done);}
.acc-daily-cb.ck{background:var(--done);border-color:var(--done);}
.acc-daily-cb.ck::after{content:'';display:block;width:6px;height:6px;background:#fff;clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);}
.acc-daily-text{font-size:12px;color:var(--text);flex:1;}
.acc-daily-text.dn{text-decoration:line-through;color:var(--text-3);}
.acc-daily-st{font-size:10px;font-weight:500;padding:1px 6px;border-radius:999px;}
/* Inline edit */
.pm-edit-panel{display:none;flex-direction:column;gap:6px;padding:8px 10px;background:var(--hover);border-radius:var(--r);margin-top:6px;}
.pm-edit-panel.open{display:flex;}
.pm-ep-inp{font-size:12px;padding:6px 8px;border:1px solid var(--border-2);border-radius:7px;background:#fff;color:var(--text);font-family:var(--font);width:100%;}
.pm-ep-inp:focus{outline:none;border-color:var(--text);}
.pm-ep-row{display:flex;gap:5px;align-items:center;}
.pm-ep-lbl{font-size:10px;color:var(--text-3);white-space:nowrap;min-width:28px;}
.pm-ep-btns{display:flex;gap:4px;justify-content:flex-end;}
.pm-ep-save{font-size:11px;padding:4px 12px;border-radius:6px;border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);font-weight:500;}
.pm-ep-cancel{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);}

/* ════════════════════════════════════════
   FEEDBACK WAITING CARD
════════════════════════════════════════ */
.feedback-card{background:linear-gradient(135deg,#FFFEF7,#FFF8E6);border:1px solid rgba(201,168,106,.2);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:9px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.feedback-card::before{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--review);}
.feedback-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.feedback-icon{font-size:16px;flex-shrink:0;}
.feedback-client{font-size:13px;font-weight:600;color:var(--text);}
.feedback-req{font-size:12px;color:var(--text-2);margin-top:1px;line-height:1.5;}
.feedback-footer{display:flex;align-items:center;gap:8px;margin-top:8px;}
.feedback-days{font-size:11px;font-weight:600;color:var(--review);}
.feedback-days.warn{color:var(--urgent);}
.feedback-done{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(201,168,106,.4);background:transparent;cursor:pointer;color:var(--review);font-family:var(--font);}
.feedback-done:hover{background:var(--review);color:#fff;}
.feedback-del{width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-size:12px;border-radius:50%;margin-left:auto;display:flex;align-items:center;justify-content:center;}
.feedback-del:hover{color:var(--urgent);}

/* ════════════════════════════════════════
   REPORT, CHECKOUT, MONTHLY, SETTINGS
════════════════════════════════════════ */
.tone-row{display:flex;gap:5px;margin-bottom:12px;}
.tone-btn{flex:1;font-size:11px;padding:7px 4px;border-radius:8px;border:1px solid var(--border-2);background:var(--card);cursor:pointer;color:var(--text-2);font-family:var(--font);transition:all .15s;text-align:center;}
.tone-btn.on{background:var(--text);color:#fff;border-color:var(--text);}
.re-save-row{display:flex;gap:7px;margin-bottom:12px;}
.re-save-btn{flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);}
.re-copy-btn{padding:10px 16px;font-size:13px;border-radius:var(--r);border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);}
.report-editor{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);}
.re-section{border-bottom:1px solid var(--border);}
.re-section:last-child{border-bottom:none;}
.re-head{display:flex;align-items:center;gap:6px;padding:11px 14px 9px;}
.re-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.re-title{font-size:11px;font-weight:500;color:var(--text-2);flex:1;}
.re-count{font-size:10px;color:var(--text-3);}
.re-items{padding:0 14px 8px;}
.re-item-row{display:flex;align-items:center;gap:4px;padding:2px 0;}
.re-item-row:hover .re-item-del{opacity:1;}
.re-item-inp{flex:1;font-size:13px;padding:3px 6px;border:none;border-bottom:1px solid transparent;background:transparent;color:var(--text);font-family:var(--font);}
.re-item-inp:focus{outline:none;border-bottom-color:var(--border-2);}
.re-item-del{width:16px;height:16px;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-size:11px;border-radius:3px;opacity:0;flex-shrink:0;}
.re-item-del:hover{color:var(--urgent);opacity:1!important;}
.re-add-row{display:flex;align-items:center;gap:4px;padding:2px 0 4px;}
.re-add-inp{flex:1;font-size:12px;padding:3px 6px;border:1px dashed var(--border-2);border-radius:5px;background:transparent;color:var(--text);font-family:var(--font);}
.re-add-inp:focus{outline:none;border-color:var(--border-2);}
.re-add-sub{font-size:11px;padding:3px 7px;border-radius:5px;border:1px solid var(--border-2);background:transparent;cursor:pointer;color:var(--text-2);font-family:var(--font);}
.rs-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.rs-head{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.rs-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.rs-item{font-size:13px;color:var(--text);padding:2px 0;line-height:1.5;}
.rs-none{font-size:12px;color:var(--text-3);font-style:italic;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-card{background:var(--card);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);}
.stat-lbl{font-size:10px;color:var(--text-3);margin-bottom:3px;font-weight:500;}
.stat-val{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-1px;}
.stat-sub{font-size:10px;color:var(--text-2);margin-top:2px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.chart-lbl{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:10px;}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);}
.settings-head{font-size:10px;font-weight:700;color:var(--text-2);padding:10px 14px;border-bottom:1px solid var(--border);letter-spacing:.4px;text-transform:uppercase;}
.cl-group{margin-bottom:7px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.cl-group-head{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--hover);border-bottom:1px solid var(--border);}
.cl-group-dot{width:8px;height:8px;border-radius:50%;}
.cl-group-lbl{font-size:11px;font-weight:600;color:var(--text-2);flex:1;}
.cl-group-cnt{font-size:10px;color:var(--text-3);}
.cl-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);background:#fff;}
.cl-row:last-child{border-bottom:none;}
.cl-name{font-size:12px;font-weight:500;flex:1;color:var(--text);}
.cl-sel{font-size:11px;padding:3px 7px;border:1px solid var(--border-2);border-radius:5px;background:var(--input-bg);color:var(--text);font-family:var(--font);appearance:none;cursor:pointer;}
.cl-del-btn{width:20px;height:20px;border:none;background:transparent;cursor:pointer;border-radius:4px;color:var(--text-3);font-size:11px;}
.cl-del-btn:hover{color:var(--urgent);}
.add-cl-row{display:flex;gap:5px;padding:9px 12px;flex-wrap:wrap;}
.fi2{font-size:12px;padding:6px 8px;border:1px solid var(--border-2);border-radius:7px;background:var(--input-bg);color:var(--text);font-family:var(--font);appearance:none;}
.fi2:focus{outline:none;}
.small-btn{padding:6px 12px;font-size:12px;font-weight:500;border-radius:7px;border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);white-space:nowrap;}

/* ════════════════════════════════════════
   PROJECT MODAL
════════════════════════════════════════ */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:7000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-back.open{display:flex;}
.modal-box{background:var(--card);border-radius:var(--r-xl);padding:22px;width:460px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.12);max-height:88vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;}
.modal-field{margin-bottom:11px;}
.modal-lbl{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
.modal-inp{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--border-2);border-radius:var(--r);background:var(--input-bg);color:var(--text);font-family:var(--font);}
.modal-inp:focus{outline:none;border-color:var(--text);background:#fff;}
.modal-ta{width:100%;font-size:13px;padding:9px 11px;border:1px solid var(--border-2);border-radius:var(--r);background:var(--input-bg);color:var(--text);font-family:var(--font);resize:vertical;min-height:80px;line-height:1.6;}
.modal-ta:focus{outline:none;border-color:var(--text);background:#fff;}
.modal-row{display:flex;gap:8px;}
.modal-row .modal-field{flex:1;}
.ai-gen-btn{display:flex;align-items:center;gap:6px;font-size:11px;padding:7px 13px;border-radius:8px;border:1px solid rgba(91,124,153,.3);background:#EEF4FA;color:var(--working);cursor:pointer;font-family:var(--font);margin-bottom:8px;transition:all .15s;}
.ai-gen-btn:hover{background:var(--working);color:#fff;}
.ai-gen-btn:disabled{opacity:.4;cursor:not-allowed;}
.ai-status{font-size:12px;color:var(--working);display:none;padding:4px 0;}
.cl-prev{background:var(--hover);border-radius:var(--r);padding:10px 12px;margin-top:8px;display:none;}
.cl-prev.on{display:block;}
.modal-btns{display:flex;gap:7px;margin-top:16px;}
.modal-cancel{padding:10px 16px;font-size:13px;border-radius:var(--r);border:1px solid var(--border-2);background:transparent;color:var(--text-2);cursor:pointer;font-family:var(--font);}
.modal-save{flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:var(--r);border:none;background:var(--text);color:#fff;cursor:pointer;font-family:var(--font);}

/* ════════════════════════════════════════
   TOAST (undo 지원 — 18번)
════════════════════════════════════════ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:9px 18px;border-radius:20px;display:none;white-space:nowrap;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,.18);align-items:center;gap:10px;}
.toast.show{display:flex;}
.toast-undo{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.85);cursor:pointer;font-family:var(--font);flex-shrink:0;}
.toast-undo:hover{background:rgba(255,255,255,.15);}
.empty{text-align:center;padding:28px;color:var(--text-3);font-size:12px;line-height:1.8;}
select{appearance:none;-webkit-appearance:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-mark">✦</div>
    <div class="login-title">업무 대시보드</div>
    <div class="login-sub">디자이너를 위한 AI 업무 운영 시스템</div>
    <div class="login-lbl">사번</div>
    <input class="login-inp" id="login-input" type="text" placeholder="사번 입력"
      inputmode="numeric" maxlength="12"
      onkeydown="if(event.key==='Enter'){event.preventDefault();doLogin()}">
    <button class="login-btn" onclick="doLogin()">시작하기 →</button>
    <div class="login-err" id="login-error"></div>
    <div class="login-hint">사번으로 로그인하면 데이터가<br>브라우저에 안전하게 저장돼요</div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout" id="layout-root">

  <!-- ══ LEFT: CALENDAR + DAILY ══ -->
  <div class="left-panel" id="left-panel">
    <!-- Sticky header -->
    <div class="lcal-sticky">
      <div class="lcal-topbar">
        <span class="lcal-logo">업무 대시보드</span>
        <span class="save-dot" id="saveDot"></span>
      </div>
      <div class="lcal-mnav">
        <span class="lcal-mlbl" id="lcal-month-title"></span>
        <div class="lcal-navs">
          <button class="lcal-nav" onclick="lcalPrev()">‹</button>
          <button class="lcal-nav today" onclick="lcalToday()">오늘</button>
          <button class="lcal-nav" onclick="lcalNext()">›</button>
        </div>
      </div>
      <div class="lcal-dlabels">
        <div class="lcal-dlbl sun">일</div><div class="lcal-dlbl">월</div><div class="lcal-dlbl">화</div>
        <div class="lcal-dlbl">수</div><div class="lcal-dlbl">목</div><div class="lcal-dlbl">금</div>
        <div class="lcal-dlbl sat">토</div>
      </div>
    </div>

    <!-- Calendar grid -->
    <div class="lcal-grid-area">
      <div class="lcal-grid7" id="lcal-grid"></div>
    </div>

    <!-- Daily list (scrolls with left panel) -->
    <div class="lcal-body">
      <div id="lcal-detail-section"></div>
      <div class="lcal-qa" id="lcal-qa">
        <div class="lcal-qa-head" id="lcal-qa-head">업무 추가</div>
        <input class="lcal-qa-inp" id="lcal-qa-inp" placeholder="업무 내용"
          onkeyup="if(event.key==='Enter'&&!event.isComposing)lcalQuickAdd()">
        <div class="lcal-qa-row">
          <select class="lcal-qa-sel" id="lcal-qa-client"><option value="">고객사 없음</option></select>
          <select class="lcal-qa-sel" id="lcal-qa-type">
            <option value="today">오늘 할일</option>
            <option value="nextweek">차주 예정</option>
            <option value="issue">이슈사항</option>
          </select>
          <button class="lcal-qa-go" onclick="lcalQuickAdd()">추가</button>
          <button class="lcal-qa-x" onclick="document.getElementById('lcal-qa').classList.remove('open')">✕</button>
        </div>
      </div>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- ══ RIGHT: PROJECTS ══ -->
  <div class="right-panel" id="right-panel">
    <div class="rheader">
      <div class="rheader-top">
        <div class="week-nav">
          <button class="wnav" onclick="chWk(-1)">‹</button>
          <span class="wlbl" id="wkLabel"></span>
          <button class="wnav" onclick="chWk(1)">›</button>
        </div>
      </div>
      <div class="rtab-bar">
        <button class="rtab on" onclick="setRTab(this,'projects')">프로젝트 관리</button>
        <button class="rtab" onclick="setRTab(this,'report')">주간보고서</button>
        <button class="rtab" onclick="setRTab(this,'checkout')">퇴근보고</button>
        <button class="rtab" onclick="setRTab(this,'monthly')">월간성과</button>
        <button class="rtab" onclick="setRTab(this,'settings')">설정</button>
      </div>
    </div>

    <!-- PROJECTS -->
    <div id="rpane-projects" style="display:flex;flex-direction:column;overflow:hidden;flex:1;">
      <!-- AI Brief (19번) -->
      <div style="padding:14px 18px 0;flex-shrink:0;">
        <div class="ai-brief">
          <div class="ai-brief-head">
            <div class="ai-brief-icon">✦</div>
            <span class="ai-brief-title">오늘의 AI 브리핑</span>
            <button class="ai-brief-ref" onclick="runAIBrief()">새로고침</button>
          </div>
          <div id="ai-brief-body"><div class="ai-brief-empty">잠시 후 분석됩니다...</div></div>
        </div>
      </div>
      <!-- Stats -->
      <div class="pm-stats" id="pm-stats"></div>
      <!-- Add -->
      <div class="pm-add-area">
        <div class="pm-type-row">
          <button class="pm-type-btn on" onclick="pmSelType(this,'daily')">일일 업무</button>
          <button class="pm-type-btn" onclick="openProjModal()">＋ 프로젝트</button>
        </div>
        <div class="pm-input-row">
          <input class="pm-add-inp" id="pm-add-inp"
            placeholder="업무 입력 (자연어: '삼성 메인 수정')"
            onkeyup="onPmInputKey(event)" oninput="onPmInputChange(this.value)">
          <select class="pm-client-sel" id="pm-daily-client"><option value="">고객사</option></select>
          <button class="pm-add-go" onclick="pmAdd()">추가</button>
        </div>
        <div class="pm-ai-hint" id="ai-classify-hint"></div>
        <div class="pm-proj-dates" id="pm-proj-dates" style="display:none;">
          <span class="pm-date-lbl">시작</span><input type="date" class="pm-date-inp" id="pm-start">
          <span class="pm-date-lbl">종료</span><input type="date" class="pm-date-inp" id="pm-end">
          <select class="pm-client-sel" id="pm-client-sel"><option value="">고객사</option></select>
        </div>
      </div>
      <div class="pm-body" id="pm-body"></div>
    </div>

    <!-- REPORT -->
    <div class="rpane" id="rpane-report" style="display:none;">
      <div class="tone-row">
        <button class="tone-btn on" data-t="concise" onclick="setTone(this)">📝 간결</button>
        <button class="tone-btn" data-t="polite" onclick="setTone(this)">🎩 정중</button>
        <button class="tone-btn" data-t="practical" onclick="setTone(this)">⚡ 실무형</button>
        <button class="tone-btn" data-t="ai" onclick="setTone(this);genAIReport()">✦ AI 작성</button>
      </div>
      <div class="re-save-row">
        <button class="re-save-btn" onclick="saveReport()">💾 저장</button>
        <button class="re-copy-btn" onclick="copyReport()">복사</button>
      </div>
      <div class="report-editor" id="report-editor"></div>
    </div>

    <!-- CHECKOUT -->

<!-- TOAST with undo (18번) -->
<div class="toast" id="toast">

<script>
/* ═══════════════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════════════ */
const DAYS=['일','월','화','수','목','금','토'];
const SEC_ORDER=['gov-done','sub-done','gov-next','sub-next','issue','etc'];
const SEC_LBL={'gov-done':'정부/민간 금주 완료 업무','sub-done':'구독제 금주 완료 업무','gov-next':'정부/민간 차주 예정 업무','sub-next':'구독제 차주 예정 업무','issue':'이슈사항','etc':'기타'};
const SEC_DOT={'gov-done':'#378ADD','sub-done':'#1D9E75','gov-next':'#3B6D11','sub-next':'#3B6D11','issue':'#E24B4A','etc':'#888780'};
const BASE_S={'gov':'정부/민간','sub':'구독제','issue':'이슈','etc':'기타'};
const SEC_CHIP={'gov-done':'chip-gov','sub-done':'chip-sub','gov-next':'chip-next','sub-next':'chip-next','issue':'chip-issue','etc':'chip-etc'};
const PRI_COLOR={'high':'#E24B4A','mid':'#EF9F27','low':'#97C459'};
const TAG_CLASS={'gov':'pm-tag-gov','sub':'pm-tag-sub','issue':'pm-tag-issue','etc':'pm-tag-etc'};
const TASK_STATUS_CLS={waiting:'acc-st-hold',working:'acc-st-working',reviewing:'acc-st-review',revising:'acc-st-revise',done:'acc-st-done',hold:'acc-st-hold'};
const TASK_STATUS={
  waiting:{label:'대기중',cls:'acc-st-hold',icon:'○'},
  working:{label:'작업중',cls:'acc-st-working',icon:'▶'},
  reviewing:{label:'고객확인중',cls:'acc-st-review',icon:'👁'},
  revising:{label:'수정중',cls:'acc-st-revise',icon:'✏'},
  done:{label:'완료',cls:'acc-st-done',icon:'✓'},
  hold:{label:'보류',cls:'acc-st-hold',icon:'⏸'}
};
let reportTone='concise';

let wkOff=0,wk='',todayStr='';
let WS={clients:{},tasks:{},username:'',reportEdits:{}};
let chartW=null,chartC=null;
let pmCalYear=0,pmCalMonth=0,pmCalSelected='';
let pmAddType='daily';

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;')}
function wLoad(){try{const r=localStorage.getItem('wr_local');if(r)WS=JSON.parse(r)}catch(_){}}
function wSave(){
  try{localStorage.setItem('wr_local',JSON.stringify(WS));}catch(_){}
  const d=document.getElementById('saveDot');if(d)d.style.background='#639922';
}
let undoFn=null,toastTimer=null;
function toast(m,undoCb){
  const t=document.getElementById('toast');
  const msg=document.getElementById('toast-msg');
  const undo=document.getElementById('toast-undo');
  if(!t||!msg)return;
  msg.textContent=m;
  undoFn=undoCb||null;
  if(undo)undo.style.display=undoCb?'block':'none';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.classList.remove('show');undoFn=null;},undoCb?4000:2200);
}
function doUndo(){if(undoFn){undoFn();undoFn=null;document.getElementById('toast').classList.remove('show');}}
function localDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getWkKey2(off){const d=new Date();const dow=d.getDay();d.setDate(d.getDate()-(dow===0?6:dow-1)+off*7);return localDate(d)}
function getWkLabel(k){const d=new Date(k+'T00:00:00');return `${d.getMonth()+1}월 ${Math.ceil(d.getDate()/7)}주차`}
function getFullLabel(k){const d=new Date(k+'T00:00:00');return `${WS.username||'홍길동'} ${d.getMonth()+1}월 ${Math.ceil(d.getDate()/7)}주차 주간보고`}
function fmtD(dk){const d=new Date(dk+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`}
function mkId(){return 'id_'+Date.now()+'_'+Math.floor(Math.random()*100000)}
function taskSec(t){
  if(t.base==='issue')return 'issue';if(t.base==='etc')return 'etc';
  if(t.isNext)return t.base+'-next';if(t.done)return t.base+'-done';return t.base+'-next';
}
function chWk(d){wkOff+=d;wInit()}

/* ═══════════════════════════════════════════
   RESIZER
═══════════════════════════════════════════ */
const resizer=document.getElementById('resizer');
const leftPanel=document.getElementById('left-panel');
// Set initial 59% width properly after render
window.addEventListener('load',()=>{
  const totalW=document.getElementById('layout-root')?.offsetWidth||window.innerWidth;
  leftPanel.style.width=Math.round(totalW*0.59)+'px';
});
let isResizing=false,startX=0,startW=0;
resizer.addEventListener('mousedown',e=>{
  isResizing=true;startX=e.clientX;startW=leftPanel.offsetWidth;
  resizer.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';
});
window.addEventListener('mousemove',e=>{
  if(!isResizing)return;
  const newW=Math.max(280,Math.min(window.innerWidth-200,startW+(e.clientX-startX)));
  leftPanel.style.width=newW+'px';
});
window.addEventListener('mouseup',()=>{
  if(!isResizing)return;isResizing=false;resizer.classList.remove('dragging');
  document.body.style.cursor='';document.body.style.userSelect='';
});

/* ═══════════════════════════════════════════
   CLIENT SELECT
═══════════════════════════════════════════ */
function renderClientSel(){
  lcalUpdateClients();
  ['pm-client-sel','pm-daily-client','proj-client'].forEach(selId=>{
    const pmSel=document.getElementById(selId);
    if(!pmSel)return;
    const cur=pmSel.value;
    const label=selId==='pm-daily-client'?'고객사':'고객사 없음';
    pmSel.innerHTML=`<option value="">${label}</option>`;
    Object.keys(WS.clients).forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;if(n===cur)o.selected=true;pmSel.appendChild(o);});
  });
}
function saveName(){WS.username=document.getElementById('s-username').value.trim();wSave();}
function addClient(){
  const name=document.getElementById('nc-name').value.trim(),sec=document.getElementById('nc-sec').value;if(!name)return;
  WS.clients[name]=sec;document.getElementById('nc-name').value='';wSave();renderClSettings();renderClientSel();
}
function rmClient(name){delete WS.clients[name];wSave();renderClSettings();renderClientSel();toast('고객사 삭제됐어요');}
function upClient(name,sec){WS.clients[name]=sec;wSave();}
function renderClSettings(){
  const el=document.getElementById('cl-list');const names=Object.keys(WS.clients);
  if(!names.length){el.innerHTML='<div style="padding:9px 11px;font-size:12px;color:#a0a0a0">등록된 고객사가 없어요.</div>';return;}
  const groups=[{key:'gov',label:'정부/민간',dot:'#378ADD'},{key:'sub',label:'구독제',dot:'#1D9E75'},{key:'issue',label:'이슈사항',dot:'#E24B4A'},{key:'etc',label:'기타',dot:'#888780'}];
  el.innerHTML=groups.map(g=>{
    const members=names.filter(n=>WS.clients[n]===g.key);if(!members.length)return '';
    const rows=members.map(n=>`<div class="cl-row"><span class="cl-name">${esc(n)}</span><select class="cl-sel" onchange="upClient('${esc(n)}',this.value)">${['gov','sub','issue','etc'].map(v=>`<option value="${v}"${WS.clients[n]===v?' selected':''}>${{gov:'정부/민간',sub:'구독제',issue:'이슈',etc:'기타'}[v]}</option>`).join('')}</select><button class="cl-del-btn" onclick="rmClient('${esc(n)}')">✕</button></div>`).join('');
    return `<div class="cl-group"><div class="cl-group-head"><span class="cl-group-dot" style="background:${g.dot}"></span><span class="cl-group-label">${g.label}</span><span class="cl-group-count">${members.length}개</span></div>${rows}</div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   PROJECT MANAGEMENT
═══════════════════════════════════════════ */
function pmSelType(btn,type){document.querySelectorAll('.pm-type-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');pmAddType=type||'daily';const dr=document.getElementById('pm-proj-dates');if(dr){dr.style.display=pmAddType==='project'?'flex':'none';}}

function pmAdd(){
  const content=document.getElementById('pm-add-inp').value.trim();if(!content)return;
  const isProject=(pmAddType==='project');
  const clientVal=isProject?(document.getElementById('pm-client-sel')?.value||''):(document.getElementById('pm-daily-client')?.value||'');
  const startDate=document.getElementById('pm-start')?.value||todayStr;
  const endDate=document.getElementById('pm-end')?.value||'';
  const base=clientVal?(WS.clients[clientVal]||'etc'):'etc';
  if(!WS.tasks[wk])WS.tasks[wk]=[];
  const t={id:mkId(),content,client:clientVal,base,pri:'mid',done:false,isNext:false,isProject,
    date:todayStr,startDate:isProject?startDate:'',endDate:isProject?endDate:'',
    carriedFrom:null,scheduledDate:'',order:WS.tasks[wk].length,files:[]};
  WS.tasks[wk].push(t);
  document.getElementById('pm-add-inp').value='';
  wSave();renderPM();renderPMCalendar();
}

function pmToggleDone(id){
  const t=findTask(id);if(!t)return;t.done=!t.done;wSave();renderPM();renderPMCalendar();
}
function pmDelete(id){
  for(const wkKey of Object.keys(WS.tasks)){
    WS.tasks[wkKey]=WS.tasks[wkKey].filter(x=>String(x.id)!==String(id));
  }
  wSave();renderPM();renderPMCalendar();toast('삭제됐어요');
}

function findTask(id){
  for(const wkKey of Object.keys(WS.tasks)){
    const t=(WS.tasks[wkKey]||[]).find(x=>String(x.id)===String(id));
    if(t)return t;
  }return null;
}
function getAllTasks(){return Object.values(WS.tasks).flat();}

function projProgress(t){
  // checklist-based progress takes priority
  if(t.checklist&&t.checklist.length>0){
    return Math.round(t.checklist.filter(x=>x.done).length/t.checklist.length*100);
  }
  if(t.manualProgress!==undefined)return t.manualProgress;
  if(!t.startDate||!t.endDate)return -1;
  const s=new Date(t.startDate+'T00:00:00'),e=new Date(t.endDate+'T00:00:00'),n=new Date(todayStr+'T00:00:00');
  if(n<=s)return 0;if(n>=e)return 100;return Math.round((n-s)/(e-s)*100);
}

function startPmEdit(id){
  const panel=document.getElementById('pmedit-'+id);
  if(!panel)return;
  const isOpen=panel.classList.contains('open');
  document.querySelectorAll('.pm-edit-panel.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen)panel.classList.add('open');
}
function cancelPmEdit(id){document.getElementById('pmedit-'+id)?.classList.remove('open');}
function savePmEdit(id){
  const t=findTask(id);if(!t)return;
  const title=document.getElementById('pmed-title-'+id)?.value.trim();
  if(!title)return;
  t.content=title;
  t.startDate=document.getElementById('pmed-start-'+id)?.value||t.startDate||'';
  t.endDate=document.getElementById('pmed-end-'+id)?.value||t.endDate||'';
  const progEl=document.getElementById('pmed-prog-'+id);
  if(progEl)t.manualProgress=parseInt(progEl.value);
  const clientVal=document.getElementById('pmed-client-'+id)?.value||'';
  t.client=clientVal;t.base=clientVal?(WS.clients[clientVal]||'etc'):'etc';
  cancelPmEdit(id);wSave();renderPM();renderPMCalendar();toast('수정됐어요');
}

function makeClientOpts(selected){
  return '<option value="">고객사 없음</option>'+Object.keys(WS.clients).map(n=>`<option value="${esc(n)}"${selected===n?' selected':''}>${esc(n)}</option>`).join('');
}



function renderPM(){
  const body=document.getElementById('pm-body');if(!body)return;
  const all=getAllTasks();
  const projs=all.filter(t=>t.isProject);
  const wkDaily=(WS.tasks[wk]||[]).filter(t=>!t.isProject);
  const todayDly=wkDaily.filter(t=>t.date===todayStr&&!t.isNext);
  const active=projs.filter(t=>!t.done);
  const donePM=projs.filter(t=>t.done);

  // Stats
  const statsEl=document.getElementById('pm-stats');
  if(statsEl){
    const totalProj=projs.length,doneProj=donePM.length;
    const totalD=wkDaily.filter(t=>!t.isNext).length,doneD=wkDaily.filter(t=>!t.isNext&&t.done).length;
    statsEl.innerHTML=`
      <div class="pm-stat"><div class="pm-stat-val">${active.length}</div><div class="pm-stat-lbl">진행 프로젝트</div></div>
      <div class="pm-stat"><div class="pm-stat-val">${todayDly.length}</div><div class="pm-stat-lbl">오늘 할일</div></div>
      <div class="pm-stat"><div class="pm-stat-val">${totalProj?Math.round(doneProj/totalProj*100):0}%</div><div class="pm-stat-lbl">프로젝트 완료율</div></div>
      <div class="pm-stat"><div class="pm-stat-val">${totalD?Math.round(doneD/totalD*100):0}%</div><div class="pm-stat-lbl">업무 완료율</div></div>`;
  }

  let html='';
  // Feedback waiting
  html+=renderFeedbackSection();
  // Active projects accordion
  if(active.length){
    html+=`<div class="pm-section-head"><span class="pm-sect-title">진행 중 프로젝트</span><span class="pm-sect-count">${active.length}개</span></div>`;
    html+=active.map((t,i)=>renderAccordionCard(t,i===0)).join('');
  } else {
    html+=`<div class="pm-section-head"><span class="pm-sect-title">진행 중 프로젝트</span></div>`;
    html+=`<div class="empty">진행 중인 프로젝트가 없어요.<br>위에서 프로젝트를 추가해보세요.</div>`;
  }
  // Done projects
  if(donePM.length){
    html+=`<div class="pm-section-head"><span class="pm-sect-title" style="color:var(--text-3)">완료된 프로젝트</span><span class="pm-sect-count">${donePM.length}개</span></div>`;
    html+=donePM.map(t=>renderAccordionCard(t,false)).join('');
  }
  body.innerHTML=html;
}

function renderAccordionCard(t,defaultOpen){
  const sid=t.id;
  const prog=projProgress(t);
  const barColor=prog>=80?'var(--urgent)':prog>=50?'var(--review)':'var(--done)';
  const st=t.status||'working';
  const stCls=TASK_STATUS_CLS[st]||'acc-st-working';
  const stLbl=TASK_STATUS[st]?.label||'작업중';
  const sD=t.startDate?new Date(t.startDate+'T00:00:00'):null;
  const eD=t.endDate?new Date(t.endDate+'T00:00:00'):null;
  const dateStr=sD?(sD.getMonth()+1+'/'+sD.getDate()+(eD?' ~ '+(eD.getMonth()+1)+'/'+eD.getDate():'')):'' ;
  const isOpen=defaultOpen;
  const cl=t.checklist||[];
  const clDone=cl.filter(x=>x.done).length;

  const checklistHtml=cl.length?`
    <div class="cl-title"><span>체크리스트</span><span class="cl-prog">${clDone}/${cl.length}</span></div>
    ${cl.map(item=>{
      const alreadyAdded=isAlreadyAddedToDaily(item.text);
      return `<div class="pm-cl-item" draggable="true"
        ondragstart="clDragStart(event,'${sid}','${item.id}')"
        ondragover="clDragOver(event,'${sid}','${item.id}')"
        ondrop="clDrop(event,'${sid}','${item.id}')"
        ondragend="clDragEnd()">
        <span class="cl-drag">⣿</span>
        <div class="cl-cb${item.done?' ck':''}" onclick="toggleChecklistItem('${sid}','${item.id}')"></div>
        <span class="cl-text${item.done?' dn':''}">${esc(item.text)}</span>
        ${alreadyAdded?'<span class="cl-added">오늘 추가됨</span>':''}
        ${!alreadyAdded&&!item.done?`<button class="cl-add-daily" onclick="addChecklistToDaily('${sid}','${item.id}')">+ 오늘</button>`:''}
        <button class="cl-del" onclick="deleteChecklistItem('${sid}','${item.id}')">✕</button>
      </div>`;
    }).join('')}
    <div class="cl-add-row">
      <input class="cl-add-inp" id="cl-inp-${sid}" placeholder="항목 추가..."
        onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();addChecklistItemFromInput('${sid}')}">
      <button class="cl-add-sub" onclick="addChecklistItemFromInput('${sid}')">+</button>
    </div>
    <div class="cl-ai-row">
      <input class="cl-ai-inp" id="cl-ai-inp-${sid}" placeholder="AI 재배치 요청 (예: 개발 우선으로)">
      <button class="cl-ai-btn" id="cl-ai-btn-${sid}" onclick="aiReorderChecklist('${sid}')">✦ AI 재배치</button>
    </div>`:
    `<div class="cl-add-row">
      <input class="cl-add-inp" id="cl-inp-${sid}" placeholder="체크리스트 항목 추가..."
        onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();addChecklistItemFromInput('${sid}')}">
      <button class="cl-add-sub" onclick="addChecklistItemFromInput('${sid}')">+</button>
    </div>`;

  const editPanel=`<div class="pm-edit-panel" id="pmedit-${sid}">
    <input class="pm-ep-inp" id="pmed-title-${sid}" value="${esc(t.content)}"

function toggleAcc(id){
  const body=document.getElementById('acc-body-'+id);
  const toggle=document.getElementById('acc-toggle-'+id);
  if(!body||!toggle)return;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  toggle.classList.toggle('open',!isOpen);
}

function pmGetAllTasksForDate(ds){
  const result=[];
  Object.values(WS.tasks).flat().forEach(t=>{
    if(t.date===ds&&!t.isProject)result.push(t);
    if(t.isProject&&t.startDate&&t.endDate&&ds>=t.startDate&&ds<=t.endDate)result.push(t);
    if(t.isProject&&t.startDate&&!t.endDate&&t.startDate===ds)result.push(t);
  });
  return result;
}
function pmCalPrev(){pmCalMonth--;if(pmCalMonth<0){pmCalMonth=11;pmCalYear--;}renderPMCalendar();}
function pmCalNext(){pmCalMonth++;if(pmCalMonth>11){pmCalMonth=0;pmCalYear++;}renderPMCalendar();}
function pmCalSelectDay(ds){
  pmCalSelected=ds;
  document.getElementById('pm-start') && !document.getElementById('pm-start').value && (document.getElementById('pm-start').value=ds);
  renderPMCalendar();
}
function renderPMCalendar(){
  const titleEl=document.getElementById('pm-cal-title');if(!titleEl)return;
  titleEl.textContent=`${pmCalYear}년 ${pmCalMonth+1}월`;
  const grid=document.getElementById('pm-cal-grid');
  const dlabels=['일','월','화','수','목','금','토'];
  let html=dlabels.map((d,i)=>`<div class="pm-cdlbl${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
  const firstDay=new Date(pmCalYear,pmCalMonth,1).getDay();
  const lastDate=new Date(pmCalYear,pmCalMonth+1,0).getDate();
  const prevLast=new Date(pmCalYear,pmCalMonth,0).getDate();
  for(let i=firstDay-1;i>=0;i--)html+=`<div class="pm-cell other-month"><div class="pm-cdn">${prevLast-i}</div></div>`;
  for(let d=1;d<=lastDate;d++){
    const ds=`${pmCalYear}-${String(pmCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tasks=pmGetAllTasksForDate(ds);
    const isToday=ds===todayStr,isSel=ds===pmCalSelected;
    const dots=tasks.slice(0,5).map(t=>{
      const col=t.done?'#97C459':t.isProject?'#7F77DD':PRI_COLOR[t.pri||'mid'];
      return `<span class="pm-cdot" style="background:${col}"></span>`;
    }).join('');
    html+=`<div class="pm-cell${isToday?' today':''}${isSel?' selected':''}" onclick="pmCalSelectDay('${ds}')"><div class="pm-cdn">${d}</div><div class="pm-cdots">${dots}</div></div>`;
  }
  const rem=(7-((firstDay+lastDate)%7))%7;
  for(let i=1;i<=rem;i++)html+=`<div class="pm-cell other-month"><div class="pm-cdn">${i}</div></div>`;
  grid.innerHTML=html;

  // Detail
  const detailEl=document.getElementById('pm-cal-detail');
  if(!detailEl)return;
  const ds=pmCalSelected||todayStr;
  const tasks=pmGetAllTasksForDate(ds);
  if(!tasks.length){detailEl.classList.remove('show');return;}
  const d2=new Date(ds+'T00:00:00');
  detailEl.classList.add('show');
  detailEl.innerHTML=`<div class="pm-cal-detail-head">${d2.getMonth()+1}/${d2.getDate()}(${DAYS[d2.getDay()]}) · ${tasks.length}건</div>`+
    tasks.map(t=>{const col=t.done?'#97C459':t.isProject?'#7F77DD':PRI_COLOR[t.pri||'mid'];
    return `<div class="pm-cal-di"><span class="pm-cal-didot" style="background:${col}"></span><span${t.done?' style="text-decoration:line-through;color:#a0a0a0"':''}>${esc(t.content)}</span>${t.isProject?'<span style="font-size:10px;color:#7F77DD;margin-left:2px">프로젝트</span>':''}</div>`;}).join('');
}

function taskSec2(t){
  if(t.base==='issue')return 'issue';if(t.base==='etc')return 'etc';
  if(t.isNext)return t.base+'-next';if(t.done)return t.base+'-done';return t.base+'-next';
}
function groupByClient(items){
  const order=[],map={};
  items.forEach(t=>{const key=t.client||'__none__';if(!map[key]){map[key]=[];order.push(key);}map[key].push(t);});
  return order.map(k=>({client:k==='__none__'?'':k,tasks:map[k]}));
}

function renderReportEditor(){
  const editor=document.getElementById('report-editor');if(!editor)return;
  const tasks=(WS.tasks[wk]||[]).filter(t=>!t.isProject);
  if(!WS.reportEdits)WS.reportEdits={};
  const edKey=wk;
  if(!WS.reportEdits[edKey]){
    // Build from tasks
    const data={};
    SEC_ORDER.forEach(s=>{
      const items=tasks.filter(t=>taskSec2(t)===s);
      const groups=groupByClient(items);
      data[s]=[];
      groups.forEach(g=>{
        if(g.client)g.tasks.forEach(t=>data[s].push({id:t.id,text:`${g.client} : ${t.content}`}));
        else g.tasks.forEach(t=>data[s].push({id:t.id,text:t.content}));
      });
    });
    WS.reportEdits[edKey]=data;
  }
  const editData=WS.reportEdits[edKey];

  editor.innerHTML=SEC_ORDER.map(s=>{
    const items=editData[s]||[];
    const itemsHtml=items.map((item,i)=>`
      <div class="re-item-row" data-sec="${s}" data-idx="${i}">
        <input class="re-item-input" value="${esc(item.text)}" data-sec="${s}" data-idx="${i}"
          onchange="updateReportItem('${s}',${i},this.value)"
          onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();addReportItemAfter('${s}',${i})}else if(event.key==='Backspace'&&this.value===''){event.preventDefault();deleteReportItem('${s}',${i})}">
        <button class="re-item-del" onclick="deleteReportItem('${s}',${i})">✕</button>
      </div>`).join('');
    return `<div class="re-section">
      <div class="re-head">
        <span class="re-dot" style="background:${SEC_DOT[s]}"></span>
        <span class="re-title">${SEC_LBL[s]}</span>
        <span class="re-count">${items.length}건</span>
      </div>
      <div class="re-items" id="re-items-${s}">
        ${itemsHtml}
        <div class="re-add-row">
          <input class="re-add-input" placeholder="항목 추가..." id="re-add-${s}"
            onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();addReportItem('${s}')}">
          <button class="re-add-btn" onclick="addReportItem('${s}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateReportItem(sec,idx,val){
  if(!WS.reportEdits[wk])return;
  if(WS.reportEdits[wk][sec]&&WS.reportEdits[wk][sec][idx]!==undefined)
    WS.reportEdits[wk][sec][idx].text=val;
}
function deleteReportItem(sec,idx){
  if(!WS.reportEdits[wk])return;
  WS.reportEdits[wk][sec].splice(idx,1);wSave();renderReportEditor();
  toast('항목 삭제됐어요');
}
function addReportItem(sec){
  const input=document.getElementById('re-add-'+sec);if(!input)return;
  const val=input.value.trim();if(!val)return;
  if(!WS.reportEdits[wk])WS.reportEdits[wk]={};
  if(!WS.reportEdits[wk][sec])WS.reportEdits[wk][sec]=[];
  WS.reportEdits[wk][sec].push({id:mkId(),text:val});
  input.value='';wSave();renderReportEditor();
  // focus on the new item
  setTimeout(()=>{const items=document.querySelectorAll(`[data-sec="${sec}"] .re-item-input`);if(items.length)items[items.length-1].focus();},50);
}
function addReportItemAfter(sec,idx){
  if(!WS.reportEdits[wk]||!WS.reportEdits[wk][sec])return;
  WS.reportEdits[wk][sec].splice(idx+1,0,{id:mkId(),text:''});
  wSave();renderReportEditor();
  setTimeout(()=>{
    const inputs=document.querySelectorAll(`#re-items-${sec} .re-item-input`);
    if(inputs[idx+1])inputs[idx+1].focus();
  },50);
}
function saveReport(){
  // collect current input values
  if(!WS.reportEdits[wk])WS.reportEdits[wk]={};
  SEC_ORDER.forEach(s=>{
    const inputs=document.querySelectorAll(`#re-items-${s} .re-item-input`);
    if(!WS.reportEdits[wk][s])WS.reportEdits[wk][s]=[];
    inputs.forEach((inp,i)=>{if(WS.reportEdits[wk][s][i])WS.reportEdits[wk][s][i].text=inp.value;});
  });
  wSave();toast('저장됐어요 ✓');
}
function copyReport(){
  saveReport();
  const edKey=wk;const editData=WS.reportEdits[edKey]||{};
  let lines=[`<${getFullLabel(wk)}>\n`];
  SEC_ORDER.forEach(s=>{
    lines.push(`● ${SEC_LBL[s]}`);
    const items=editData[s]||[];
    if(!items.length)lines.push('');
    else items.forEach(item=>{if(item.text.trim())lines.push(`- ${item.text}`);});
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('복사됐어요!'));
}

function copyCheckout(){
  const tasks=(WS.tasks[wk]||[]).filter(t=>!t.isProject);
  const msg=document.getElementById('checkout-msg').value.trim()||'퇴근합니다!';
  const done=tasks.filter(t=>t.date===todayStr&&t.done&&!t.isNext);
  const pending=tasks.filter(t=>t.date===todayStr&&!t.done&&!t.isNext);
  let lines=[`[퇴근보고] ${msg}`,'']; 
  if(done.length)done.forEach(t=>lines.push(`- ${t.client?t.client+' : ':''}${t.content}`));
  else lines.push('(완료한 업무 없음)');
  if(pending.length){lines.push('');lines.push('▸ 미완료');pending.forEach(t=>lines.push(`- ${t.client?t.client+' : ':''}${t.content}`));}
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('퇴근보고 복사됐어요!'));
}

   MONTHLY
═══════════════════════════════════════════ */
function renderMonthly(){
  const now=new Date();const month=now.getMonth(),year=now.getFullYear();
  const weekKeys=[];const cur=new Date(year,month,1);const lastDay=new Date(year,month+1,0);
  const dow=cur.getDay();cur.setDate(cur.getDate()-(dow===0?6:dow-1));
  while(cur<=lastDay){const wKey=localDate(cur);if(!weekKeys.includes(wKey))weekKeys.push(wKey);cur.setDate(cur.getDate()+7);}
  const allTasks=weekKeys.flatMap(k=>(WS.tasks[k]||[]));
  const real=allTasks.filter(t=>!t.isNext&&!t.isProject);
  const total=real.length,done=real.filter(t=>t.done).length,rate=total?Math.round(done/total*100):0;
  const clients=new Set(real.map(t=>t.client).filter(Boolean)).size;
  document.getElementById('monthly-stats').innerHTML=`<div class="stat-card"><div class="stat-lbl">총 업무</div><div class="stat-val">${total}</div><div class="stat-sub">이번 달</div></div><div class="stat-card"><div class="stat-lbl">완료율</div><div class="stat-val">${rate}%</div><div class="stat-sub">달성률</div></div>`;
  const wLabels=weekKeys.map((_,i)=>`${i+1}주`);
  const wDone=weekKeys.map(k=>(WS.tasks[k]||[]).filter(t=>!t.isNext&&!t.isProject&&t.done).length);
  const wTotal=weekKeys.map(k=>(WS.tasks[k]||[]).filter(t=>!t.isNext&&!t.isProject).length);
  if(chartW)chartW.destroy();
  chartW=new Chart(document.getElementById('chart-weekly'),{type:'bar',data:{labels:wLabels,datasets:[{label:'완료',data:wDone,backgroundColor:'#1D9E75',borderRadius:3},{label:'전체',data:wTotal,backgroundColor:'rgba(0,0,0,0.07)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  const clientMap={};real.forEach(t=>{if(t.client)clientMap[t.client]=(clientMap[t.client]||0)+1});
  const cNames=Object.keys(clientMap).sort((a,b)=>clientMap[b]-clientMap[a]);const cVals=cNames.map(n=>clientMap[n]);
  const colors=['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#888780'];
  const barH=Math.max(140,cNames.length*38+30);document.getElementById('client-chart-wrap').style.height=barH+'px';
  if(chartC)chartC.destroy();
  chartC=new Chart(document.getElementById('chart-client'),{type:'bar',data:{labels:cNames,datasets:[{data:cVals,backgroundColor:cNames.map((_,i)=>colors[i%colors.length]),borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'rgba(0,0,0,0.04)'}},y:{grid:{display:false}}}}});
}

async function genProjChecklist(){

  if(!desc && !name){ toast('프로젝트명이나 설명을 먼저 입력해주세요'); return; }
  const btn = document.getElementById('proj-ai-btn');
  const status = document.getElementById('proj-ai-status');
  btn.disabled = true; status.style.display = 'block';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{role:'user', content:`프로젝트명: ${name||'(없음)'}
프로젝트 설명: ${desc||'(없음)'}

위 프로젝트를 진행하기 위해 필요한 업무 체크리스트를 5~10개 생성해주세요.
JSON 배열만 응답하세요 (설명 없이): ["업무1","업무2","업무3",...]`}]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text||'').replace(/\`\`\`json|\`\`\`/g,'').trim();

/* ─── Checklist functions ─── */
function toggleChecklistItem(taskId, itemId){
  const t = findTask(taskId); if(!t||!t.checklist) return;
  const item = t.checklist.find(x=>x.id===itemId); if(!item) return;
  item.done = !item.done;
  // auto-calc progress from checklist
  const total = t.checklist.length;
  const done = t.checklist.filter(x=>x.done).length;
  t.manualProgress = total ? Math.round(done/total*100) : 0;
  wSave(); renderPM();
}
function deleteChecklistItem(taskId, itemId){
  const t = findTask(taskId); if(!t||!t.checklist) return;
  t.checklist = t.checklist.filter(x=>x.id!==itemId);
  const total = t.checklist.length;
  t.manualProgress = total ? Math.round(t.checklist.filter(x=>x.done).length/total*100) : 0;
  wSave(); renderPM();
}
function addChecklistItemToTask(taskId, text){
  const t = findTask(taskId); if(!t) return;
  if(!t.checklist) t.checklist = [];
  t.checklist.push({id:mkId(), text, done:false});
  t.manualProgress = Math.round(t.checklist.filter(x=>x.done).length/t.checklist.length*100);
  wSave(); renderPM();
}
function addChecklistItemFromInput(taskId){
  const input = document.getElementById('cl-inp-'+ taskId);
  if(!input) return;
  const text = input.value.trim(); if(!text) return;
  addChecklistItemToTask(taskId, text);
  input.value = '';
}
function isAlreadyAddedToDaily(itemText){
  return (WS.tasks[wk]||[]).some(t=>!t.isProject&&t.date===todayStr&&t.content===itemText);
}
function addChecklistToDaily(taskId, itemId){
  const t = findTask(taskId); if(!t||!t.checklist) return;
  const item = t.checklist.find(x=>x.id===itemId); if(!item) return;

let lcalYear=0,lcalMonth=0,lcalSelected='';

function lcalPrev(){lcalMonth--;if(lcalMonth<0){lcalMonth=11;lcalYear--;}renderLCal();}
function lcalNext(){lcalMonth++;if(lcalMonth>11){lcalMonth=0;lcalYear++;}renderLCal();}
function lcalToday(){const n=new Date();lcalYear=n.getFullYear();lcalMonth=n.getMonth();lcalSelected=localDate(n);renderLCal();}

function lcalGetTasksForDate(ds){
  const result=[];
  Object.values(WS.tasks).flat().forEach(t=>{
    if(!t.isProject&&t.date===ds)result.push(t);
    if(t.isProject&&t.startDate&&t.endDate&&ds>=t.startDate&&ds<=t.endDate)result.push({...t,_projBar:true});
    if(t.isProject&&t.startDate&&!t.endDate&&t.startDate===ds)result.push(t);
  });
  return result;
}

// project colors pool
const PROJ_COLORS=['#7F77DD','#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517'];
function getProjColor(id){
  const all=getAllTasks().filter(t=>t.isProject);
  const idx=all.findIndex(t=>t.id===id);
  return PROJ_COLORS[Math.max(0,idx)%PROJ_COLORS.length];
}

function renderLCal(){
  const titleEl=document.getElementById('lcal-month-title');
  if(!titleEl)return;
  titleEl.textContent=`${lcalYear}년 ${lcalMonth+1}월`;


  const grid=document.getElementById('lcal-grid');
  const firstDay=new Date(lcalYear,lcalMonth,1).getDay();
  const lastDate=new Date(lcalYear,lcalMonth+1,0).getDate();
  const prevLast=new Date(lcalYear,lcalMonth,0).getDate();

  // gather all active projects for bar rendering
  const activeProjs=getAllTasks().filter(t=>t.isProject&&!t.done&&t.startDate);

  let html='';
  // prev month padding
  for(let i=firstDay-1;i>=0;i--){
    html+=`<div class="lcal-cell other-month"><div class="lcal-dn">${prevLast-i}</div></div>`;
  }

  for(let d=1;d<=lastDate;d++){
    const ds=`${lcalYear}-${String(lcalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr,isSel=ds===lcalSelected;

    // daily tasks for this date
    const dayTasks=Object.values(WS.tasks).flat().filter(t=>!t.isProject&&t.date===ds);
    // projects that span this date
    const dayProjs=activeProjs.filter(t=>ds>=t.startDate&&(t.endDate?ds<=t.endDate:t.startDate===ds));

    let eventsHtml='';
    const MAX_VISIBLE=3;
    let count=0;

    // project bars first
    dayProjs.forEach(proj=>{
      if(count>=MAX_VISIBLE){return;}
      const col=getProjColor(proj.id);
      const isStart=ds===proj.startDate;
      const isEnd=proj.endDate?ds===proj.endDate:true;
      let posClass=isStart&&isEnd?'proj-single':isStart?'proj-start':isEnd?'proj-end':'proj-mid';
      const label=isStart?esc(proj.content):'';
      eventsHtml+=`<div class="lcal-event proj-bar ${posClass}" style="background:${col}" 
        onclick="event.stopPropagation();lcalSelectDay('${ds}')" title="${esc(proj.content)}">
        ${label}
      </div>`;
      count++;
    });

    // daily tasks
    dayTasks.forEach(t=>{
      if(count>=MAX_VISIBLE)return;
      const issueClass=t.base==='issue'?' issue':'';
      const doneClass=t.done?' done':'';
      eventsHtml+=`<div class="lcal-event daily${issueClass}${doneClass}" 
        onclick="event.stopPropagation();lcalSelectDay('${ds}')" title="${esc(t.content)}">
        ${t.done?'✓ ':''} ${esc(t.content)}
      </div>`;
      count++;
    });

    const totalCount=dayProjs.length+dayTasks.length;
    if(totalCount>MAX_VISIBLE){
      eventsHtml+=`<div class="lcal-more">+${totalCount-MAX_VISIBLE}개</div>`;
    }

    html+=`<div class="lcal-cell${isToday?' today':''}${isSel?' selected':''}" 
      onclick="lcalSelectDay('${ds}')" data-date="${ds}">
      <div class="lcal-dn">${d}</div>
      ${eventsHtml}
    </div>`;
  }

  const rem=(7-((firstDay+lastDate)%7))%7;
  for(let i=1;i<=rem;i++){
    html+=`<div class="lcal-cell other-month"><div class="lcal-dn">${i}</div></div>`;
  }
  grid.innerHTML=html;

  // Enable project end-date drag resize
  setupProjDragResize();
  renderLCalDetail();
}

document.addEventListener('mousedown',e=>{

  const proj=getAllTasks().filter(t=>t.isProject&&!t.done&&t.startDate).find(t=>
    (bar.classList.contains('proj-end')||bar.classList.contains('proj-single'))&&t.endDate===ds||
    (bar.classList.contains('proj-start')||bar.classList.contains('proj-single'))&&t.startDate===ds

function renderLCalDetail(){
  const el=document.getElementById('lcal-detail-section');if(!el)return;
  const ds=lcalSelected||todayStr;
  const tasks=lcalGetTasksForDate(ds).filter(t=>!t._projBar&&!t.isProject);
  const projs=lcalGetTasksForDate(ds).filter(t=>t.isProject||t._projBar).filter((t,i,a)=>a.findIndex(x=>x.id===t.id)===i);
  const d=new Date(ds+'T00:00:00');
  const isToday=ds===todayStr;
  const headLbl=isToday?`오늘 · ${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`:
    `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
  const done=tasks.filter(t=>t.done).length;
  let html=`<div class="daily-header">
    <div>
      <div class="daily-date-lbl">${headLbl}</div>
      ${tasks.length?`<div class="daily-sub">${done}/${tasks.length} 완료</div>`:''}
    </div>
    <button class="daily-add-btn" onclick="lcalOpenQuickAdd('${ds}')">+ 추가</button>
  </div>`;
  const pending=tasks.filter(t=>!t.done);
  const doneItems=tasks.filter(t=>t.done);
  if(pending.length){
    html+=`<div class="daily-sect">할 일</div>`;
    html+=pending.map(t=>renderDailyPill(t)).join('');
  }
  if(doneItems.length){
    html+=`<div class="daily-sect" style="margin-top:12px;">완료</div>`;
    html+=doneItems.map(t=>renderDailyPill(t)).join('');
  }
  if(projs.length){
    html+=`<div class="daily-sect" style="margin-top:12px;">프로젝트</div>`;
    projs.forEach(t=>{
      const prog=projProgress(t);
      html+=`<div class="daily-item" style="background:#F3EFFA;border-color:rgba(92,56,128,.12);">
        <span style="font-size:12px;flex-shrink:0;">📁</span>
        <span class="daily-text">${esc(t.content)}</span>
        ${prog>=0?`<span style="font-size:10px;color:var(--hold);font-weight:600;">${prog}%</span>`:''}
      </div>`;
    });
  }
  if(!tasks.length&&!projs.length){
    html+=`<div class="daily-empty">등록된 업무가 없어요</div>`;
  }
  el.innerHTML=html;
}
function renderDailyPill(t){
  const priColor={high:'var(--urgent)',mid:'var(--review)',low:'var(--done)'}[t.pri||'mid'];
  const isAdded=(t.fromProjectId!=null);
  return `<div class="daily-item${t.done?' done-item':''}${isAdded?' added-today':''}">
    <div class="daily-cb${t.done?' ck':''}" onclick="lcalToggle('${t.id}')"></div>
    <span class="daily-text${t.done?' dn':''}">${esc(t.content)}</span>
    ${t.client?`<span class="daily-client">${esc(t.client)}</span>`:''}
    ${isAdded&&!t.done?`<span class="daily-added-badge">추가됨</span>`:''}
    <span class="daily-pri" style="background:${priColor}"></span>
    <button class="daily-x" onclick="deleteDailyTask('${t.id}')">✕</button>
  </div>`;
}

const RM_KEY='rm_data_v1';
let rmData={out:[],in:[]};

function rmLoad(){try{const r=localStorage.getItem(RM_KEY);if(r)rmData=JSON.parse(r);}catch(_){}}
function rmSaveData(){try{localStorage.setItem(RM_KEY,JSON.stringify(rmData));}catch(_){}}

function rmDaysDiff(dateStr){
  if(!dateStr)return 0;
  const d=new Date(dateStr+'T00:00:00'),t=new Date(todayStr+'T00:00:00');
  return Math.floor((t-d)/86400000);
}

function rmUpdateBadge(){
  const pending=[...rmData.out,...rmData.in].filter(x=>!x.done);
  const urgent=pending.filter(x=>x.date&&rmDaysDiff(x.date)>=3);
  const badge=document.getElementById('rm-badge');
  if(!badge)return;
  if(pending.length){
    badge.textContent=pending.length;
    badge.style.display='inline';
    badge.style.background=urgent.length?'#E24B4A':'#EF9F27';
  } else {
    badge.style.display='none';
  }
}

function rmOpenForm(dir){
  document.getElementById('rm-form-out').classList.remove('open');

function renderRmCard(item){
  const diff=item.date?rmDaysDiff(item.date):-1;
  let daysCls='ok',daysLabel='';
  if(diff>=0){
    daysLabel=diff===0?'오늘 등록':`D+${diff}`;
    daysCls=diff>=7?'urgent':diff>=3?'warn':'ok';
  }
  const dirClass=item.dir==='out'?'rm-out':'rm-in';
  const dirLabel=item.dir==='out'?'↑ 내가 요청':'↓ 고객사 요청';
  const dirBadgeClass=item.dir==='out'?'rm-dir-out':'rm-dir-in';
  return `<div class="rm-card ${dirClass}${item.done?' rm-done':''}">
    <div class="rm-card-head">
      <span class="rm-dir-badge ${dirBadgeClass}">${dirLabel}</span>
      <span class="rm-client">${esc(item.client)}</span>
    </div>
    <div class="rm-req">${esc(item.req)}</div>
    ${item.memo?`<div class="rm-memo">${esc(item.memo)}</div>`:''}
    <div class="rm-footer">
      ${daysLabel?`<span class="rm-days ${daysCls}">${daysLabel}</span>`:'<span></span>'}
      <div class="rm-actions">
        <button class="rm-done-btn" onclick="rmToggleDone('${item.id}','${item.dir}')">${item.done?'↩ 미완료':'✓ 완료'}</button>
        <button class="rm-del-btn" onclick="rmDelete('${item.id}','${item.dir}')">✕</button>
      </div>
    </div>
  </div>`;
}

function renderReminders(){
  const outActive=rmData.out.filter(x=>!x.done);
  const outDone=rmData.out.filter(x=>x.done);
  const inActive=rmData.in.filter(x=>!x.done);
  const inDone=rmData.in.filter(x=>x.done);

  // sort by days (urgent first)
  const sortByDays=(a,b)=>rmDaysDiff(b.date)-rmDaysDiff(a.date);
  outActive.sort(sortByDays);inActive.sort(sortByDays);

  const outEl=document.getElementById('rm-list-out');
  const inEl=document.getElementById('rm-list-in');
  const outCount=document.getElementById('rm-out-count');
  const inCount=document.getElementById('rm-in-count');
  if(!outEl||!inEl)return;

  if(outCount)outCount.textContent=outActive.length?`${outActive.length}건 미완료`:'';
  if(inCount)inCount.textContent=inActive.length?`${inActive.length}건 미완료`:'';

  outEl.innerHTML=outActive.length?outActive.map(renderRmCard).join('')+
    (outDone.length?`<div style="font-size:10px;color:#a0a0a0;margin:6px 0 4px;font-weight:500;">완료됨</div>`+outDone.map(renderRmCard).join(''):
    ''):`<div class="rm-empty">요청한 자료가 없어요</div>`;

  inEl.innerHTML=inActive.length?inActive.map(renderRmCard).join('')+
    (inDone.length?`<div style="font-size:10px;color:#a0a0a0;margin:6px 0 4px;font-weight:500;">완료됨</div>`+inDone.map(renderRmCard).join(''):
    ''):`<div class="rm-empty">고객사에서 요청한 자료가 없어요</div>`;
  rmUpdateBadge();
  }
